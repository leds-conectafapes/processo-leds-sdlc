site_name: LEDS SDLC Process
site_description: Documentação do Processo de Desenvolvimento de Software do LEDS
site_author: LEDS

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Alternar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Alternar para modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Início: index.md
  - Estrutura da Equipe: team/equipe.md
  - Processo SDLC:
    - Visão Geral: sdlc/0_processo.md
    - 1. Planejamento: sdlc/1_planning.md
    - 2. Discovery: sdlc/2_discovery.md
  - Modelos:
    - SOW (Statement of Work): modelos/sow_template.md
    - Base de Conhecimento:
      - Visão Geral: modelos/knowledge/overview.md
      - Mapa de Domínios: modelos/knowledge/domain-map.md
      - Dicionário: modelos/knowledge/dictionary.md
      - Matriz de Domínios (DSM): modelos/knowledge/dsm.md
      - Domínios:
        - Compliance: modelos/knowledge/domains/compliance.md
        - Integrações Externas: modelos/knowledge/domains/external-integrations.md
        - Gestão Financeira: modelos/knowledge/domains/financial-management.md
        - Instituição de Execução: modelos/knowledge/domains/grantee-institution.md
        - Beneficiário: modelos/knowledge/domains/grantee.md
        - Concessor: modelos/knowledge/domains/grantor.md
        - Pagamentos: modelos/knowledge/domains/payments.md
        - Convenente: modelos/knowledge/domains/subrecipient.md
