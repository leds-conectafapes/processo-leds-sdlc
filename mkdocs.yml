site_name: LEDS SDLC Process - Ciclo de Vida de Desenvolvimento de Software
site_description: Documentação do Ciclo de Vida de Desenvolvimento de Software (SDLC) do LEDS / LEDS Software Development Life Cycle (SDLC) Documentation
site_author: LEDS
copyright: Copyright &copy; 2026 LEDS

repo_name: leds-conectafapes/processo-leds-sdlc
repo_url: https://github.com/leds-conectafapes/processo-leds-sdlc

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Alternar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Alternar para modo claro
  font:
    text: Outfit
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.expand
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Início: index.md
  - Estrutura da Equipe: team/equipe.md
  - Processo SDLC:
    - Visão Geral: sdlc/0_processo.md
    - 1. Statement of Work (SOW): sdlc/1_sow.md
    - 2. Discovery: sdlc/2_discovery.md
  - Modelos:
    - SOW (Statement of Work): modelos/sow_template.md
    - Base de Conhecimento:
      - Visão Geral: modelos/knowledge/overview.md
      - Mapa de Domínios: modelos/knowledge/domain-map.md
      - Dicionário: modelos/knowledge/dictionary.md
      - Matriz de Domínios (DSM): modelos/knowledge/dsm.md
      - Domínios:
        - Compliance: modelos/knowledge/domains/compliance.md
        - Integrações Externas: modelos/knowledge/domains/external-integrations.md
        - Gestão Financeira: modelos/knowledge/domains/financial-management.md
        - Instituição de Execução: modelos/knowledge/domains/grantee-institution.md
        - Beneficiário: modelos/knowledge/domains/grantee.md
        - Concessor: modelos/knowledge/domains/grantor.md
        - Pagamentos: modelos/knowledge/domains/payments.md
        - Convenente: modelos/knowledge/domains/subrecipient.md
